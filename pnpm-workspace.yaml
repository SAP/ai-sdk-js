packages:
  - packages/ai-api
  - packages/core
  - packages/document-grounding
  - packages/foundation-models
  - packages/langchain
  - packages/orchestration
  - packages/batch-api
  - packages/prompt-registry
  - packages/rpt
  - sample-cap
  - sample-code
  - tests/e2e-tests
  - tests/smoke-tests
  - tests/type-tests

blockExoticSubdeps: true
minimumReleaseAge: 5760
minimumReleaseAgeExclude:
  - '@sap-cloud-sdk/*'
  # Add minimum age exceptions for audit issues here
  # - sample-package@0.1.0
  - 'uuid@13.0.2'
  - ip-address@10.1.1
  - hono@4.12.16
  - fast-uri@3.1.2
  - hono@4.12.18
overrides:
  uuid@^13.0.0: '>=13.0.2'
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 131400 # 3 months
