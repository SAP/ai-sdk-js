packages:
  - packages/ai-api
  - packages/core
  - packages/document-grounding
  - packages/foundation-models
  - packages/openai
  - packages/langchain
  - packages/orchestration
  - packages/llm-batch
  - packages/prompt-registry
  - packages/rpt
  - sample-cap
  - sample-code
  - tests/e2e-tests
  - tests/smoke-tests
  - tests/type-tests

versioning:
  fixed:
    - ['@sap-ai-sdk/*']
  maxBump: minor
  changelog:
    storage: repository
  # POC: openai/rpt could graduate onto a parallel prerelease track ("alpha" lane).
  # A fixed group must move lanes together, so this requires first narrowing `fixed`
  # above to exclude them, e.g. fixed: [['@sap-ai-sdk/core', '@sap-ai-sdk/ai-api', ...]]
  # (listing the group members explicitly, minus openai/rpt), then:
  # lanes:
  #   '@sap-ai-sdk/openai': alpha
  #   '@sap-ai-sdk/rpt': alpha

allowBuilds:
  better-sqlite3: false
  esbuild: false
  unrs-resolver: false

blockExoticSubdeps: true
minimumReleaseAge: 5760
minimumReleaseAgeExclude:
  - '@sap-ai-sdk/*'
  - '@sap-cloud-sdk/*'
  # Add minimum age exceptions for audit issues here
  # - sample-package@0.1.0
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'picomatch@4.0.5'
trustPolicyIgnoreAfter: 131400 # 3 months
