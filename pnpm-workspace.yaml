packages:
  - packages/ai-api
  - packages/core
  - packages/document-grounding
  - packages/foundation-models
  - packages/openai
  - packages/langchain
  - packages/orchestration
  - packages/llm-batch
  - packages/prompt-registry
  - packages/rpt
  - sample-cap
  - sample-code
  - tests/e2e-tests
  - tests/smoke-tests
  - tests/type-tests

allowBuilds:
  better-sqlite3: false
  esbuild: false
  unrs-resolver: false

blockExoticSubdeps: true
minimumReleaseAge: 5760
minimumReleaseAgeExclude:
  - '@sap-ai-sdk/*'
  - '@sap-cloud-sdk/*'
  - '@sap-ai-sdk/*'
  # Add minimum age exceptions for audit issues here
  # - sample-package@0.1.0
  - esbuild@0.28.1
  - form-data@4.0.6
  - js-yaml@4.1.2
  - hono@4.12.25
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 131400 # 3 months
