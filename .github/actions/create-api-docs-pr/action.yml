name: Create API Docs PR
description: Copies generated API docs to the ai-sdk repo and creates a pull request.

inputs:
  token:
    description: 'GitHub App token with write access to SAP/ai-sdk.'
    required: true
  bot-email:
    description: 'Email for the bot git config.'
    required: true
  bot-name:
    description: 'Name for the bot git config.'
    required: true

runs:
  using: composite
  steps:
    - name: Get version from package.json
      id: version
      shell: bash
      run: |
        FULL_VERSION=$(node -p "require('./package.json').version")
        MAJOR_VERSION=$(echo "$FULL_VERSION" | cut -d. -f1)
        echo "major-version=$MAJOR_VERSION" >> "$GITHUB_OUTPUT"

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        repository: SAP/ai-sdk
        path: ai-sdk
        token: ${{ inputs.token }}

    - name: Copy API docs
      shell: bash
      env:
        MAJOR_VERSION: ${{ steps.version.outputs.major-version }}
      run: |
        rsync -avz --delete knowledge-base/api-reference/ ai-sdk/static/api/v${MAJOR_VERSION}/

    - name: Check for changes
      id: check-changes
      shell: bash
      working-directory: ai-sdk
      run: |
        if test -z "$(git status --porcelain)"; then
          echo "docs=false" >> "$GITHUB_OUTPUT"
        else
          echo "docs=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Commit and push changes
      if: steps.check-changes.outputs.docs == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        BOT_EMAIL: ${{ inputs.bot-email }}
        BOT_NAME: ${{ inputs.bot-name }}
        BRANCH_NAME: docs/api-update-v${{ steps.version.outputs.major-version }}-${{ github.run_id }}
      run: |
        gh auth setup-git

        cd ai-sdk
        git config user.email "$BOT_EMAIL"
        git config user.name "$BOT_NAME"
        git checkout -b "$BRANCH_NAME"
        git add -A
        git commit -m 'Update SAP AI SDK for JavaScript API documentation v${{ steps.version.outputs.major-version }}'
        git push -u origin "$BRANCH_NAME"

    - name: Create pull request
      if: steps.check-changes.outputs.docs == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        BRANCH_NAME: docs/api-update-v${{ steps.version.outputs.major-version }}-${{ github.run_id }}
      run: |
        gh pr create \
          --repo SAP/ai-sdk \
          --base main \
          --head "$BRANCH_NAME" \
          --title "chore: Update v${{ steps.version.outputs.major-version }} API documentation (Javascript)" \
          --body "Update the v${{ steps.version.outputs.major-version }} API documentation for SAP Cloud SDK for AI, JavaScript.

        Automatically generated by the [api-docs workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

