name: delete-dist-tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Dist tag to delete.'
        type: string
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: delete dist tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_ACCESS_TOKEN }}
          INPUTS_TAG: ${{ inputs.tag }}
        run: |
          npm dist-tag rm @sap-ai-sdk/ai-api "${INPUTS_TAG}"
          npm dist-tag rm @sap-ai-sdk/foundation-models "${INPUTS_TAG}"
          npm dist-tag rm @sap-ai-sdk/orchestration "${INPUTS_TAG}"
          npm dist-tag rm @sap-ai-sdk/core "${INPUTS_TAG}"
          npm dist-tag rm @sap-ai-sdk/document-grounding "${INPUTS_TAG}"
          npm dist-tag rm @sap-ai-sdk/langchain "${INPUTS_TAG}"
          npm dist-tag rm @sap-ai-sdk/prompt-registry "${INPUTS_TAG}"
