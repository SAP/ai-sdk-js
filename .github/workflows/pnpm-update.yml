name: Monthly pnpm Dependency Update

on:
  schedule:
    - cron: '0 2 1 * *' # Runs at 02:00 UTC on the 1st of every month
  workflow_dispatch:

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - name: Setup Environment
        uses: sap/cloud-sdk-js/.github/actions/setup@main
        with:
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
          persist-credentials: 'true'
          token: ${{ steps.app-token.outputs.token }}

      - name: Update Transitive Dependencies
        id: update-deps
        env:
          BOT_EMAIL: ${{ vars.SAP_AI_SDK_BOT_EMAIL }}
          BOT_NAME: ${{ vars.SAP_AI_SDK_BOT_NAME }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
        run: |
          pnpm --no-save update --recursive
          pnpm audit --audit-level high

          if [[ -n "$(git status --porcelain)" ]]; then
            git config --global user.email "$BOT_EMAIL"
            git config --global user.name "$BOT_NAME"
            BRANCH_NAME="bot/monthly-transitive-dependency-update-$(date -u +%Y%m%d-%H%M%S)"
            git checkout -b "$BRANCH_NAME"
            git add pnpm-lock.yaml
            git commit -m "chore: update pnpm transitive dependencies"
            git push --set-upstream origin "$BRANCH_NAME"
            echo "branch-created=true" >> $GITHUB_OUTPUT
            echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit"
            echo "branch-created=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.update-deps.outputs.branch-created == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { repo, owner } = context.repo;
            const branch = '${{ steps.update-deps.outputs.branch-name }}';
            const result = await github.rest.pulls.create({
              title: 'chore: Monthly Transitive Dependency Update',
              owner,
              repo,
              head: branch,
              base: 'main',
              body: 'This is an automated PR to update pnpm transitive dependencies.'
            });
            console.log(`Pull Request created: ${result.data.html_url}`);

      - name: Enable auto-merge
        if: steps.update-deps.outputs.branch-created == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --auto --squash "${{ steps.update-deps.outputs.branch-name }}"
