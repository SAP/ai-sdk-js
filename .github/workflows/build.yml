name: build

on:
  push:
    branches: ['main']
  pull_request: ~
  workflow_dispatch: ~

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@main
        with:
          node-version: ${{ matrix.node-version }}
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - run: pnpm test:unit
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - run: pnpm test:type

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@main
        with:
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
      - run: pnpm generate
      - run: pnpm apply-patches
      - name: Enforce generated code is up to date
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Generated code is out of date. The following changes were found after generating:"
            git status
            echo "Please run 'pnpm generate' and 'pnpm apply-patches' and commit the changes."
            exit 1
          fi
      - run: pnpm lint
      - name: Check CommonJS compatibility
        run: pnpm compile:cjs
      - name: Set NODE_PATH
        run: echo "NODE_PATH=$(pwd)/node_modules" >> $GITHUB_ENV
      - name: Check public API
        uses: sap/cloud-sdk-js/.github/actions/check-public-api@main
        with:
          force_internal_exports: 'false'
          ignored_path_pattern: '.*?/client/.*?/schema|.*?/zod/.*?'
      - name: Check dependencies
        run: pnpm check:deps
      - name: License Check
        uses: sap/cloud-sdk-js/.github/actions/check-license@license-checker
      - name: API Doc Check
        run: pnpm doc

  dependabot:
    runs-on: ubuntu-latest
    if: ${{ (github.actor == 'dependabot[bot]' || startsWith(github.event.pull_request.title, 'chore(deps')) && github.event_name == 'pull_request' }}
    needs: [test, checks]
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
      - name: Approve a PR
        if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-major' }}
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: gh pr review --approve "$PR_URL"
      - name: Enable auto-merge for Dependabot PRs
        if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-major' }}
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: gh pr merge --auto --squash "$PR_URL"
