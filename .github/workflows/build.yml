name: build

on:
  push:
    branches: ['main']
  pull_request: ~
  workflow_dispatch: ~

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]

    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@main
        with:
          node-version: ${{ matrix.node-version }}
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      # type-check can run in parallel to unit tests
      - name: Type Tests
        id: test-type
        run: pnpm test:type
        background: true
      - run: pnpm test:unit
      - name: Fetch main for SonarQube blame
        # Sonar only runs iff on first job (0) and the token is available (not on forks)
        if: ${{ env.HAS_SONAR_TOKEN == 'true' && strategy.job-index == 0 }}
        env:
          HAS_SONAR_TOKEN: ${{ secrets.SONAR_TOKEN == '' && 'false' || 'true' }}
        run: git fetch --unshallow origin main
      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' && strategy.job-index == 0 }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
      - name: Wait for type tests
        wait: test-type

  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@main
        with:
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - name: Enforce generated code is up to date
        shell: bash
        run: |
          pnpm generate
          pnpm apply-patches
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Generated code is out of date. The following changes were found after generating:"
            git status
            echo "Please run 'pnpm generate' and 'pnpm apply-patches' and commit the changes."
            exit 1
          fi
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
        background: true
      - name: Lint codebase
        id: lint
        run: pnpm lint
        background: true
      - name: Set NODE_PATH
        run: echo "NODE_PATH=$(pwd)/node_modules" >> "$GITHUB_ENV"
      # Independent read-only checks — run them concurrently.
      - parallel:
          - name: Check public API
            uses: sap/cloud-sdk-js/.github/actions/check-public-api@main
            with:
              force_internal_exports: 'false'
              ignored_path_pattern: '.*?/client/.*?/schema|.*?/zod/.*?'
          - name: Check dependencies
            run: pnpm check:deps
          - name: License Check
            uses: sap/cloud-sdk-js/.github/actions/check-license@main
          - name: API Doc Check
            run: pnpm doc
      - wait-all:

  npm-install:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@main
        with:
          registry-url: 'https://registry.npmjs.org'
          skip-build: 'true'
