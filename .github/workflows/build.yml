name: build

on:
  push:
    branches: ['main']
  pull_request: ~
  workflow_dispatch: ~

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: sap/ai-sdk-js/.github/actions/setup@main
        with:
          node-version: ${{ matrix.node-version }}
      - run: pnpm test:unit
      - run: pnpm test:type

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: sap/ai-sdk-js/.github/actions/setup@main
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
      - run: pnpm generate
      - name: Enforce generated code is up to date
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Generated code is out of date. The following changes were found after generating:"
            git status
            echo "Please run 'pnpm generate' and commit the changes."
            exit 1
          fi
      - run: pnpm lint
      - name: Check CommonJS compatibility
        run: pnpm compile:cjs
      - name: Set NODE_PATH
        run: echo "NODE_PATH=$(pwd)/node_modules" >> $GITHUB_ENV
      - name: Check public API
        uses: sap/cloud-sdk-js/.github/actions/check-public-api@main
        with:
          force_internal_exports: 'false'
          ignored_path_pattern: '.*?/client/.*?/schema|.*?/zod/.*?'
      - name: Check dependencies
        run: pnpm check:deps
      - name: License Check
        uses: sap/cloud-sdk-js/.github/actions/check-license@license-checker
      - run: pnpm doc
        name: API Doc Check

  dependabot:
    runs-on: ubuntu-latest
    if: ${{ (github.actor == 'dependabot[bot]' || startsWith(github.event.pull_request.title, 'chore(deps')) && github.event_name == 'pull_request' }}
    needs: [test, checks]
    permissions:
      contents: read
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2.5.0
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
      - name: Generate GitHub App token
        if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-major' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - name: Approve a PR
        if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-major' }}
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{steps.app-token.outputs.token}}
      - name: Enable auto-merge for Dependabot PRs
        if: ${{ steps.metadata.outputs.update-type != 'version-update:semver-major' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GITHUB_TOKEN: ${{steps.app-token.outputs.token}}
