name: 'Spec File Update Workflow (Cron Job)'

on:
  schedule:
    # At 03:21 on every 15th day-of-month from 1 through 31.
    # Example:
    #  2025-04-16 03:21:00
    #  2025-05-01 03:21:00
    #  2025-05-16 03:21:00
    - cron: 21 3 1/15 * *
  workflow_dispatch:

jobs:
  prepare-branches:
    runs-on: ubuntu-latest
    outputs:
      orchestration-branch: ${{ steps.branches.outputs.orchestration-branch }}
    steps:
      - name: 'Get orchestration version'
        id: orch-version
        run: |
          ORCH_VERSION=$(curl --silent --request GET \
            --url "https://github.tools.sap/api/v3/repos/MLF-prod/mlf-gitops-prod/contents/services/llm-orchestration/source/Chart.yaml?ref=aws.eu-central-1.prod-eu/current" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" | yq -r .version)

          if [ -z "$ORCH_VERSION" ]; then
              echo "Failed to fetch orchestration version"
              exit 1
          fi
          echo "Orchestration version: $ORCH_VERSION"
          echo "ORCH_VERSION=$ORCH_VERSION" >> "$GITHUB_OUTPUT"
        env:
          TOKEN: ${{ secrets.GH_TOOLS_TOKEN }}

      - name: 'Determine branches'
        id: branches
        run: |
          # Orchestration uses dynamic version
          if [ -n "${{ steps.orch-version.outputs.ORCH_VERSION }}" ]; then
            # remove hotfix suffix 0.110.13-2 -> 0.110.13
            ORCH_VERSION_CLEAN=$(echo "${{ steps.orch-version.outputs.ORCH_VERSION }}" | sed 's/-.*//')
            echo "orchestration-branch=rel-$ORCH_VERSION_CLEAN" >> "$GITHUB_OUTPUT"
          else
            echo "orchestration-branch=main" >> "$GITHUB_OUTPUT"
          fi

  update-ai-api:
    needs: prepare-branches
    uses: ./.github/workflows/spec-update.yaml
    with:
      file: ai-api
      file-ref: main
      create-pr: true
    secrets: inherit

  update-document-grounding:
    needs: prepare-branches
    uses: ./.github/workflows/spec-update.yaml
    with:
      file: document-grounding
      file-ref: main
      create-pr: true
    secrets: inherit

  update-prompt-registry:
    needs: prepare-branches
    uses: ./.github/workflows/spec-update.yaml
    with:
      file: prompt-registry
      file-ref: main
      create-pr: true
    secrets: inherit

  update-orchestration:
    needs: prepare-branches
    uses: ./.github/workflows/spec-update.yaml
    with:
      file: orchestration
      file-ref: ${{ needs.prepare-branches.outputs.orchestration-branch }}
      create-pr: true
    secrets: inherit

  notify-failure:
    needs: [update-ai-api, update-document-grounding, update-prompt-registry, update-orchestration]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: 'Slack Notification'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            blocks:
              - type: 'section'
                text:
                  type: 'mrkdwn'
                  text: '⚠️ Weekly spec update failed! 😬 Please inspect & fix by clicking <https://github.com/SAP/ai-sdk-js/actions/runs/${{ github.run_id }}|here>'