name: spec update (cron job)

on:
  schedule:
    # At 03:21 on every 15th day-of-month from 1 through 31.
    # Example:
    #  2025-04-16 03:21:00
    #  2025-05-01 03:21:00
    #  2025-05-16 03:21:00
    - cron: 21 3 1/15 * *
  workflow_dispatch:

permissions: {}

jobs:
  get-orchestration-reference:
    runs-on: ubuntu-latest
    outputs:
      orchestration-branch: ${{ steps.orch-version.outputs.orchestration-branch }}
    steps:
      - name: 'Get orchestration version'
        id: orch-version
        env:
          TOKEN: ${{ secrets.GH_TOOLS_TOKEN }}
        run: |
          ORCH_VERSION=$(curl --fail --silent --request GET \
            --url "https://github.tools.sap/api/v3/repos/MLF-prod/mlf-gitops-prod/contents/services/llm-orchestration/source/Chart.yaml?ref=aws.eu-central-1.prod-eu/current" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" | yq -r .version)

          if [ -z "$ORCH_VERSION" ]; then
              echo "Failed to fetch orchestration version"
              exit 1
          fi
          echo "Orchestration version: $ORCH_VERSION"
          # shellcheck disable=SC2001
          ORCH_VERSION="$(echo "$ORCH_VERSION" | sed 's/-.*//')"
          echo "orchestration-branch=rel-$ORCH_VERSION" >> "$GITHUB_OUTPUT"

  # get-rpt-reference:
  #   runs-on: ubuntu-latest
  #   outputs:
  #     rpt-tag: ${{ steps.rpt-tag.outputs.rpt-tag }}
  #   steps:
  #     - name: 'Get RPT version tag'
  #       id: rpt-tag
  #       run: |
  #         TAG=$(git -c 'versionsort.suffix=-' ls-remote --tags --sort='v:refname' https://github.tools.sap/DL-COE/sap-rpt-1-public-content | tail --lines=1 | cut -f 2)
  #
  #         if [ -z "$TAG" ]; then
  #             echo "Failed to fetch RPT tag"
  #             exit 1
  #         fi
  #         echo "rpt-tag=$TAG" >> "$GITHUB_OUTPUT"

  update-ai-api:
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/spec-update.yaml
    with:
      service: ai-api
      ref: main
      create-pr: true
    secrets: &spec-update-secrets
      NPM_TOKEN_ARTIFACTORY: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      GH_TOOLS_TOKEN: ${{ secrets.GH_TOOLS_TOKEN }}

  update-document-grounding:
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/spec-update.yaml
    with:
      service: document-grounding
      ref: main
      create-pr: true
    secrets: *spec-update-secrets

  update-prompt-registry:
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/spec-update.yaml
    with:
      service: prompt-registry
      ref: main
      create-pr: true
    secrets: *spec-update-secrets

  update-orchestration:
    needs: get-orchestration-reference
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/spec-update.yaml
    with:
      service: orchestration
      ref: ${{ needs.get-orchestration-reference.outputs.orchestration-branch }}
      create-pr: true
    secrets: *spec-update-secrets

  notify-failure:
    needs:
      - get-orchestration-reference
      - update-ai-api
      - update-document-grounding
      - update-prompt-registry
      - update-orchestration
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: 'Slack Notification'
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            blocks:
              - type: 'section'
                text:
                  type: 'mrkdwn'
                  text: '⚠️ Weekly spec update failed! 😬 Please inspect & fix by clicking <https://github.com/SAP/ai-sdk-js/actions/runs/${{ github.run_id }}|here>'
