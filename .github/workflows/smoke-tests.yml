name: smoke test

on:
  workflow_dispatch:
  schedule:
    - cron: 0 2 * * *

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@main
        with:
          node-version: '24'
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - name: Update smoke test dependencies
        run: |
          # Always use latest SDK packages for smoke tests to ensure they are tested against the latest version. The registry is set to npmjs to avoid issues with outdated packages in the Artifactory registry.
          pnpm config set --location=project @sap-ai-sdk:registry https://registry.npmjs.org/
          pnpm --filter @sap-ai-sdk/smoke-tests update '@sap-ai-sdk/*' --no-save
      - run: pnpm smoke-tests create-deployment
      - run: pnpm smoke-tests deploy
      - name: Configure deployment npm registries
        working-directory: tests/smoke-tests/deployment
        env:
          NPM_REGISTRY_MIRROR_URL: https://common.repositories.cloud.sap/artifactory/api/npm/build.releases.npm/
          NPM_REGISTRY_MIRROR_TOKEN: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
        run: |
          registry_host="${NPM_REGISTRY_MIRROR_URL#https://}"
          registry_host="${registry_host#http://}"

          npm config set registry "$NPM_REGISTRY_MIRROR_URL"
          npm config set @sap-ai-sdk:registry https://registry.npmjs.org/
          npm config set "//$registry_host:_authToken" "$NPM_REGISTRY_MIRROR_TOKEN"

      - name: Generate deployment package-lock.json
        working-directory: tests/smoke-tests/deployment
        run: |
          # Generate npm-compatible lockfile to ensure cf does not re-resolve dependencies
          npm shrinkwrap
          mv npm-shrinkwrap.json package-lock.json
          npm config set ignore-scripts true
      - uses: vchrisb/setup-cf@f43abe0d940f27e8c59c8b29226140f3a1768496 # v3.0.1
        with:
          api: ${{ vars.CF_API_URL }}
          username: ${{ secrets.CF_USER }}
          password: ${{ secrets.CF_PASSWORD }}
          org: ${{ vars.CF_ORG }}
          space: ${{ vars.CF_SPACE }}
      - run: cf push
        working-directory: tests/smoke-tests
      - name: smoke test
        run: pnpm test:smoke
      - name: shutdown
        if: always()
        run: cf stop smoke-test-app
      - name: 'Slack Notification'
        if: failure() && github.event_name == 'schedule'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "username": "GitHub E2E Test Runner",
              "text": "⚠️ Smoke Test for v2 Failed 🚭! Please inspect & fix by clicking <https://github.com/SAP/ai-sdk-js/actions/runs/${{ github.run_id }}|here>"
            }
