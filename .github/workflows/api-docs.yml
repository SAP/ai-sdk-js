name: api-docs


on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: {}

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@main
        with:
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - name: Generate API documentation
        run: |
          pnpm generate
          pnpm doc

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: ai-sdk
          permission-contents: write
          permission-pull-requests: write

      - name: Create API docs PR
        uses: ./.github/actions/create-api-docs-pr
        with:
          token: ${{ steps.app-token.outputs.token }}
          bot-email: ${{ vars.SAP_AI_SDK_BOT_EMAIL }}
          bot-name: ${{ vars.SAP_AI_SDK_BOT_NAME }}
