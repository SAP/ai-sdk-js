name: api-docs

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to generate docs for'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate docs for'
        required: true
        type: string

jobs:
  generate-and-push-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: sap/ai-sdk-js/.github/actions/setup@main
      - name: Generate API documentation
        run: |
          pnpm generate
          pnpm doc

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: ai-sdk
          permission-contents: write

      - name: Push generated API documentation to ai-sdk repo
        env:
          BOT_EMAIL: ${{ vars.SAP_AI_SDK_BOT_EMAIL }}
          BOT_NAME: ${{ vars.SAP_AI_SDK_BOT_NAME }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git config --global user.email "$BOT_EMAIL"
          git config --global user.name "$BOT_NAME"

          # Extract major version from full version (e.g., "2.8.0" -> "v2")
          MAJOR_VERSION=$(echo "$INPUT_VERSION" | cut -d. -f1)
          VERSION="v${MAJOR_VERSION}"

          cd ..
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/SAP/ai-sdk.git

          # Copy generated docs to versioned folder
          rsync -avz --delete ai-sdk-js/knowledge-base/api-reference/ ai-sdk/static/api/${VERSION}/

          cd ai-sdk
          git add -A
          git commit -m "Update SAP AI SDK for JavaScript API documentation ${VERSION}" || exit 0
          git push
