name: api-docs

# Reusable workflow to generate API docs and open a PR in SAP/ai-sdk.
# Can be triggered via workflow_call (from bump.yml) or manually via workflow_dispatch.

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to generate docs for (e.g., 2.9.0).'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate docs for (e.g., 2.9.0).'
        required: true
        type: string

jobs:
  generate-and-push-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Setup repository, node and pnpm
        uses: sap/ai-sdk-js/.github/actions/setup@main

      - name: Generate API documentation
        run: |
          pnpm generate
          pnpm doc

      - name: Checkout docs repository
        uses: actions/checkout@v6
        with:
          repository: SAP/ai-sdk
          token: ${{ secrets.GH_CLOUD_SDK_JS_ADMIN_WRITE_TOKEN }}
          fetch-depth: 0
          path: ./ai-sdk-docs

      - name: Copy generated API docs into docs repo
        run: |
          # FULL version e.g. 2.9.0 (provided by input)
          if [ -n "${{ github.event.inputs.version }}" ]; then
            FULL_VERSION="${{ github.event.inputs.version }}"
          else
            # when called via workflow_call, inputs are available at ${{ inputs.version }}
            FULL_VERSION="${{ inputs.version }}"
          fi

          MAJOR_VERSION=$(echo "$FULL_VERSION" | cut -d. -f1)
          VERSION="v${MAJOR_VERSION}"

          rsync -avz --delete knowledge-base/api-reference/ ./ai-sdk-docs/static/api/${VERSION}/

      - name: Create branch and open PR in docs repo
        working-directory: ./ai-sdk-docs
        env:
          GH_TOKEN: ${{ secrets.GH_CLOUD_SDK_JS_ADMIN_WRITE_TOKEN }}
        run: |
          git config --local user.email "cloudsdk@sap.com"
          git config --local user.name "SAP Cloud SDK Bot"

          # Determine FULL_VERSION (same logic as above)
          if [ -n "${{ github.event.inputs.version }}" ]; then
            FULL_VERSION="${{ github.event.inputs.version }}"
          else
            FULL_VERSION="${{ inputs.version }}"
          fi

          BRANCH_NAME="update-api-docs-js-${FULL_VERSION}"
          git checkout -b "$BRANCH_NAME" || git checkout "$BRANCH_NAME" || true

          # Stage changes
          git add static/api/

          # If no changes, exit successfully
          if test -z "$(git status --porcelain)"; then
            echo "No API doc changes to commit."
            exit 0
          fi

          git commit -m "Update SAP AI SDK for JavaScript API documentation ${FULL_VERSION}" || exit 0
          git push -u origin "$BRANCH_NAME"

          # Create a one-line PR body safely (avoid YAML parser issues with multiline literals)
          PR_BODY=$'This PR updates the API documentation for SAP AI SDK for JavaScript '"${FULL_VERSION}"$'\n\nGenerated automatically by the ai-sdk-js CI/CD pipeline.'
          PR_TITLE="Update API Docs for ${FULL_VERSION}"

          gh pr create --repo SAP/ai-sdk --head "$BRANCH_NAME" --base main --title "$PR_TITLE" --body "$PR_BODY"
