name: api-docs

# Note: During normal releases, API docs are generated as part of the bump workflow
# and included in the same PR as release notes.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate docs for (e.g., 2.9.0). Only the major version is used for the target folder (e.g., v2).'
        required: true
        type: string

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: sap/ai-sdk-js/.github/actions/setup@main
      - name: Generate API documentation
        run: |
          pnpm generate
          pnpm doc

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: ai-sdk
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@v6
        with:
          repository: SAP/ai-sdk
          path: ai-sdk
          token: ${{ steps.app-token.outputs.token }}

      - name: Prepare
        id: prepare
        env:
          FULL_VERSION: ${{ inputs.version }}
        run: |
          MAJOR_VERSION=$(echo "$FULL_VERSION" | cut -d. -f1)
          echo "major-version=$MAJOR_VERSION" >> "$GITHUB_OUTPUT"
          echo "branch-name=docs/api-update-v${MAJOR_VERSION}-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Copy API docs
        env:
          MAJOR_VERSION: ${{ steps.prepare.outputs.major-version }}
        run: |
          rsync -avz --delete knowledge-base/api-reference/ ai-sdk/static/api/v${MAJOR_VERSION}/

      - name: Check for changes
        id: check-changes
        working-directory: ai-sdk
        run: |
          if test -z "$(git status --porcelain)"; then
            echo "docs=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.check-changes.outputs.docs == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'Update SAP AI SDK for JavaScript API documentation v${{ steps.prepare.outputs.major-version }}'
          repository: ai-sdk
          branch: ${{ steps.prepare.outputs.branch-name }}
          create_branch: true
          commit_user_email: ${{ vars.SAP_AI_SDK_BOT_EMAIL }}
          commit_user_name: ${{ vars.SAP_AI_SDK_BOT_NAME }}

      - name: Create pull request
        if: steps.check-changes.outputs.docs == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr create \
            --repo SAP/ai-sdk \
            --base main \
            --head "${{ steps.prepare.outputs.branch-name }}" \
            --title "Update v${{ steps.prepare.outputs.major-version }} API documentation (Javascript)" \
            --body "Update the v${{ steps.prepare.outputs.major-version }} API documentation for SAP Cloud SDK for AI, JavaScript.

          Automatically generated by the [api-docs workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
