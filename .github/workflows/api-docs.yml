name: api-docs

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to generate docs for'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate docs for'
        required: true
        type: string

jobs:
  generate-and-push-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: sap/ai-sdk-js/.github/actions/setup@main
      - name: Generate API documentation
        run: |
          pnpm generate
          pnpm doc

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: ai-sdk
          permission-contents: write

      - uses: actions/checkout@v6
        with:
          repository: SAP/ai-sdk
          path: ai-sdk
          token: ${{ steps.app-token.outputs.token }}

      - name: Copy generated docs
        id: copy
        run: |
          MAJOR_VERSION=$(echo "${{ inputs.version }}" | cut -d. -f1)
          echo "major_version=$MAJOR_VERSION" >> "$GITHUB_OUTPUT"
          rsync -avz --delete knowledge-base/api-reference/ ai-sdk/static/api/v${MAJOR_VERSION}/

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'Update SAP AI SDK for JavaScript API documentation v${{ steps.copy.outputs.major_version }}'
          repository: ai-sdk
          commit_user_email: ${{ vars.SAP_AI_SDK_BOT_EMAIL }}
          commit_user_name: ${{ vars.SAP_AI_SDK_BOT_NAME }}
