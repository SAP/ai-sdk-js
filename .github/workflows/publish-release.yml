name: publish

on:
  workflow_call:

jobs:
  check-release-notes-pr:
    name: Check Release Notes PR Status
    runs-on: ubuntu-latest
    outputs:
      release-notes-branch: ${{ steps.determine-branch-name.outputs.release-notes-branch }}
      is-merged: ${{ steps.check-pr-status.outputs.merged }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: ai-sdk
          permission-contents: read
          permission-pull-requests: read
      - uses: sap/cloud-sdk-js/.github/actions/setup@main
        with:
          package-manager-cache: false
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
      - name: Determine Release Notes PR Branch Name
        id: determine-branch-name
        run: |
          VERSION=$(pnpm node -p "require('./package.json').version")
          echo "Using version: $VERSION"
          BRANCH_NAME="update-release-notes-js-$VERSION"
          echo "release-notes-branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Check PR Status (Exists, Merged)
        id: check-pr-status
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH_NAME="${{ steps.determine-branch-name.outputs.release-notes-branch }}"
          echo "Checking status for PR associated with branch: $BRANCH_NAME"

          # Get merged status. If gh pr view fails (e.g., PR not found), the step will fail.
          MERGED_OUTPUT=$(gh pr view "$BRANCH_NAME" --repo "SAP/ai-sdk" --json state --jq '.state == "MERGED" | tostring')

          # This part only runs if the above command succeeded
          echo "PR found. Is Merged: $MERGED_OUTPUT"
          echo "merged=$MERGED_OUTPUT" >> "$GITHUB_OUTPUT"

      - name: 'Check Whether Release Notes PR Can Be Merged'
        if: steps.check-pr-status.outputs.merged == 'false'
        uses: ./.github/actions/pr-is-mergeable
        with:
          pr-ref: ${{ steps.determine-branch-name.outputs.release-notes-branch }}
          repo: SAP/ai-sdk
          token: ${{ steps.app-token.outputs.token }}
          excluded-check-runs: |
            {
              \"Build Cloud SDK Documentation\": [\"dependabot\"]
            }

  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [check-release-notes-pr]
    permissions:
      id-token: write
    steps:
      - uses: sap/cloud-sdk-js/.github/actions/setup@main
        with:
          node-version: 24 # Will install npm 11 needed for trusted publishing
          package-manager-cache: false
          registry-url: 'https://registry.npmjs.org'
      - name: publish
        run: |
          pnpm changeset publish

  merge-release-notes-pr:
    name: Merge Release Notes PR (if needed)
    runs-on: ubuntu-latest
    needs: [check-release-notes-pr, publish-npm]
    if: needs.check-release-notes-pr.outputs.is-merged == 'false'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: ai-sdk
          permission-contents: write
          permission-pull-requests: write
      - name: 'Merge Release Notes PR'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "Attempting to merge PR for branch: ${{ needs.check-release-notes-pr.outputs.release-notes-branch }}"
          gh pr merge --squash "${{ needs.check-release-notes-pr.outputs.release-notes-branch }}" --delete-branch --repo "SAP/ai-sdk"

