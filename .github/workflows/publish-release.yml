name: publish

on:
  workflow_call:

jobs:
  check-docs-pr:
    name: Check Docs PR Status (Release Notes + API Docs)
    runs-on: ubuntu-latest
    outputs:
      docs_branch: ${{ steps.determine-branch-name.outputs.docs_branch }}
      is_merged: ${{ steps.check_pr_status.outputs.merged }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: ai-sdk
          permission-contents: read
          permission-pull-requests: read
      - uses: sap/ai-sdk-js/.github/actions/setup@main
        with:
          package-manager-cache: false
      - name: Determine Docs PR Branch Name
        id: determine-branch-name
        run: |
          VERSION=$(pnpm node -p "require('./package.json').version")
          echo "Using version: $VERSION"
          BRANCH_NAME="update-release-notes-js-$VERSION"
          echo "docs_branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Check PR Status (Exists, Merged)
        id: check_pr_status
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH_NAME="${{ steps.determine-branch-name.outputs.docs_branch }}"
          echo "Checking status for PR associated with branch: $BRANCH_NAME"

          # Get merged status. If gh pr view fails (e.g., PR not found), the step will fail.
          MERGED_OUTPUT=$(gh pr view "$BRANCH_NAME" --repo "SAP/ai-sdk" --json state --jq '.state == "MERGED" | tostring')

          # This part only runs if the above command succeeded
          echo "PR found. Is Merged: $MERGED_OUTPUT"
          echo "merged=$MERGED_OUTPUT" >> "$GITHUB_OUTPUT"

      - name: 'Check Whether Docs PR Can Be Merged'
        if: steps.check_pr_status.outputs.merged == 'false'
        uses: ./.github/actions/pr-is-mergeable
        with:
          pr-ref: ${{ steps.determine-branch-name.outputs.docs_branch }}
          repo: SAP/ai-sdk
          token: ${{ steps.app-token.outputs.token }}
          excluded-check-runs: |
            {
              \"Build Cloud SDK Documentation\": [\"dependabot\"]
            }

  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: [check-docs-pr]
    permissions:
      id-token: write
    steps:
      - uses: sap/ai-sdk-js/.github/actions/setup@main
        with:
          node-version: 24 # Will install npm 11 needed for trusted publishing
          package-manager-cache: false
      - name: publish
        run: |
          pnpm changeset publish

  merge-docs-pr:
    name: Merge Docs PR (if needed)
    runs-on: ubuntu-latest
    needs: [check-docs-pr, publish-npm]
    if: needs.check-docs-pr.outputs.is_merged == 'false'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: ai-sdk
          permission-contents: write
          permission-pull-requests: write
      - name: 'Merge Docs PR'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "Attempting to merge PR for branch: ${{ needs.check-docs-pr.outputs.docs_branch }}"
          gh pr merge --squash "${{ needs.check-docs-pr.outputs.docs_branch }}" --delete-branch --repo "${{ env.DOCS_REPO }}"
