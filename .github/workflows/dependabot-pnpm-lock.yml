name: Update pnpm-lock.yaml for Dependabot PRs

on:
  pull_request_target:
    types: [opened, synchronize]
    paths:
      - '**/package.json'
    branches:
      - main
      - v1-main
  workflow_dispatch:

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          permission-contents: write
      - name: Setup Environment
        uses: sap/cloud-sdk-js/.github/actions/setup@main
        with:
          ref: ${{ github.head_ref }}
          pnpm-install-args: --lockfile-only
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
          persist-credentials: 'true'
          token: ${{ steps.app-token.outputs.token }}

      - name: Commit and push if changed
        env:
          BOT_EMAIL: ${{ vars.SAP_AI_SDK_BOT_EMAIL }}
          BOT_NAME: ${{ vars.SAP_AI_SDK_BOT_NAME }}
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config --global user.email "$BOT_EMAIL"
            git config --global user.name "$BOT_NAME"
            git add pnpm-lock.yaml
            git commit -m "chore: update pnpm-lock.yaml"
            git push
          fi
