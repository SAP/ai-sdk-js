name: bump

on:
  workflow_dispatch:
    inputs:
      majorVersion:
        description: Mandatory, when bumping a major version. Semver compatible version string (X.Y.Z). Must not be set for patch and minor version releases.
        required: false

jobs:
  auth:
    uses: sap/ai-sdk-js/.github/workflows/auth.yaml@main
  bump:
    runs-on: ubuntu-latest
    needs: [auth]
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          permission-contents: write
      - uses: sap/cloud-sdk-js/.github/actions/setup@main
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: 'main'
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}
          persist-credentials: 'true'
      - name: Bump version
        id: bump
        uses: sap/cloud-sdk-js/.github/actions/changesets-fixed-version-bump@main
        with:
          majorVersion: ${{ inputs.majorVersion }}
      - name: Merge and write changelogs
        id: merge-changelogs
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        uses: sap/cloud-sdk-js/.github/actions/merge-and-write-changelogs@main
      - name: Commit and tag
        uses: sap/cloud-sdk-js/.github/actions/commit-and-tag@main
        with:
          version: ${{ steps.bump.outputs.version }}
          user-name: ${{ vars.SAP_AI_SDK_BOT_NAME }}

  prepare-release-notes:
    name: Prepare Release Notes
    runs-on: ubuntu-latest
    needs: [bump]
    outputs:
      pr-url: ${{ steps.open-pr.outputs.pr-url }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.SAP_AI_SDK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.SAP_AI_SDK_BOT_PRIVATE_KEY }}
          owner: SAP
          repositories: ai-sdk
          permission-contents: write
          permission-pull-requests: write
      - name: Checkout current repository
        uses: sap/cloud-sdk-js/.github/actions/setup@main
        with:
          node-version: ${{ vars.DEFAULT_NODE_VERSION }}
          registry-token: ${{ secrets.NPM_TOKEN_ARTIFACTORY }}

      - name: Checkout Docs Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: SAP/ai-sdk
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          path: ./ai-sdk-docs
      - name: Update release notes file
        id: update-notes
        run: |
          pnpm node --loader ts-node/esm -e "import { addCurrentChangelog } from './scripts/add-changelog.ts'; addCurrentChangelog()"

      - name: Open Release notes and API docs PR
        id: open-pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BOT_EMAIL: ${{ vars.SAP_AI_SDK_BOT_EMAIL }}
          BOT_NAME: ${{ vars.SAP_AI_SDK_BOT_NAME }}
        working-directory: ./ai-sdk-docs
        run: |
          git config --local user.email "$BOT_EMAIL"
          git config --local user.name "$BOT_NAME"
          BRANCH_NAME="update-release-notes-js-${{ needs.bump.outputs.version }}"
          git checkout -b "${BRANCH_NAME}"
          
          # Stage release notes
          git add docs-js/release-notes.mdx
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
            # Output an empty pr-url if no changes
            echo "pr-url=" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update JS release notes for ${{ needs.bump.outputs.version }}"
            git push -u origin "${BRANCH_NAME}"
            PR_BODY="Auto-created by bump workflow."
            PR_TITLE="Update JS Release Notes for ${{ needs.bump.outputs.version }}"
            PR_URL=$(gh pr create --head "${BRANCH_NAME}" --title "${PR_TITLE}" --body "${PR_BODY}" --repo "SAP/ai-sdk")
            echo "Release notes PR created: $PR_URL"
            if [[ -n "$PR_URL" ]]; then
              echo "pr-url=$PR_URL" >> "$GITHUB_OUTPUT"
            else
              echo "Failed to create PR or extract URL."
              echo "pr-url=" >> "$GITHUB_OUTPUT"
            fi
          fi

  generate-api-docs:
    name: Generate and Push API Documentation
    needs: [bump]
    uses: ./.github/workflows/api-docs.yml
    secrets: inherit
    with:
      version: ${{ needs.bump.outputs.version }}
