name: blackduck

# Required configuration (set in repo/org "Secrets and variables → Actions"):
#
#   Variables (vars):
#     - BLACKDUCK_PROJECT_NAME    e.g. sap-ai-sdk-js / sap-ai-sdk-java / sap-ai-sdk-python
#     - BLACKDUCK_PROJECT_GROUP   e.g. "SAP Cloud SDK for AI (JS)"
#
#   Secrets:
#     - BLACKDUCK_API_TOKEN
#     - SLACK_WEBHOOK             (optional, for failure notifications)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to scan (defaults to main).'
        required: false
        type: string

permissions: {}

env:
  BLACKDUCK_SKIP_PHONE_HOME: true

jobs:
  blackduck-scan:
    name: Black Duck Detect Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    timeout-minutes: 15

    steps:
      - name: Determine project version
        id: version
        env:
          INPUT_BRANCH: ${{ github.event.inputs.branch }}
        run: |
          if [ -n "$INPUT_BRANCH" ]; then
            VERSION="$INPUT_BRANCH"
          else
            VERSION="main"
          fi
          echo "Black Duck project version: $VERSION"
          echo "project_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout repository at project version
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.version.outputs.project_version }}
          persist-credentials: false

      - name: Run Black Duck SCA scan
        uses: blackduck-inc/black-duck-security-scan@3fe94e4b3c3947bd21ba46b7da255d6d3638b325 # v2.10.0
        with:
          blackducksca_url: https://sap.blackducksoftware.com
          blackducksca_token: ${{ secrets.BLACKDUCK_API_TOKEN }}
          blackducksca_scan_full: true
          blackducksca_scan_failure_severities: 'BLOCKER,CRITICAL'
          blackducksca_reports_sarif_create: true
          blackducksca_reports_sarif_severities: 'BLOCKER,CRITICAL'
          blackducksca_reports_sarif_groupSCAIssues: true
          blackducksca_upload_sarif_report: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          detect_args: >-
            --detect.project.name="${{ vars.BLACKDUCK_PROJECT_NAME }}"
            --detect.project.version.name="${{ steps.version.outputs.project_version }}"
            --detect.project.user.groups="${{ vars.BLACKDUCK_PROJECT_GROUP }}"
            --detect.code.location.name="${{ vars.BLACKDUCK_PROJECT_NAME }}/${{ steps.version.outputs.project_version }}"
            --detect.pnpm.dependency.types.excluded=DEV,OPTIONAL
            --detect.blackduck.signature.scanner.memory=4096
            --detect.timeout=6000
            --detect.blackduck.signature.scanner.arguments="--min-scan-interval=0"
            --detect.excluded.directories='**/node_modules,**/dist,**/test,**/tests,**/__tests__,**/test-packages,**/coverage'

      - name: Slack notification on failure
        if: ${{ github.event_name == 'schedule' && (failure() || cancelled()) }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_USERNAME: AI SDK Pipeline Bot
          SLACK_TITLE: 'Black Duck scan ${{ job.status }}'
          SLACK_MESSAGE: 'Black Duck scan failed for ${{ github.repository }} (version ${{ steps.version.outputs.project_version }}).'
          MSG_MINIMAL: event,actions url
          SLACK_COLOR: ${{ job.status }}
          SLACK_MSG_AUTHOR: ' '
          SLACK_ICON: https://sap.github.io/cloud-sdk/img/logo.png
        uses: rtCamp/action-slack-notify@33ca3be66c6f378fe1610fd1d5258632dbed5e58 # v2.4.0
